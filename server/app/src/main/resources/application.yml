spring:
  application:
    name: qingteng-server

  datasource:
    url: jdbc:mysql://localhost:3306/qingteng?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
